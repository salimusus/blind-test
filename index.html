<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Blin Test Musical - Artiste ou Titre</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);

            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .players-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .player-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .player-badge.active {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transform: scale(1.05);
            box-shadow: 0 0 0 3px gold;
        }

        .player-score {
            background: gold;
            color: #333;
            border-radius: 30px;
            padding: 2px 8px;
            margin-left: 6px;
            font-size: 0.7rem;
        }

        .game-panel {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            border-radius: 50px;
            padding: 20px;
            margin: 15px 0;
        }

        .turn-indicator {
            background: #f9ca24;
            border-radius: 50px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .music-icon {
            font-size: 3.5rem;
            margin: 10px 0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 10px #f9ca24; }
        }

        .extrait-info {
            background: #0f3460;
            border-radius: 30px;
            padding: 8px;
            margin: 10px 0;
            color: white;
            font-size: 0.9rem;
        }

        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .audio-btn {
            background: #00b894;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #008f6b;
            transition: 0.05s linear;
        }

        .audio-btn:active { transform: translateY(3px); }
        .audio-btn.play { background: #6c5ce7; box-shadow: 0 4px 0 #4a3a9e; }
        .audio-btn.stop { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        .audio-btn.mic { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        .audio-btn.mic.recording { background: #27ae60; animation: pulseMic 1s infinite; }

        @keyframes pulseMic {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .answer-area {
            margin: 15px 0;
        }

        .answer-input {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 3px solid #6c5ce7;
            border-radius: 50px;
            text-align: center;
            font-family: inherit;
            background: white;
        }

        .voice-feedback {
            background: #2c3e66;
            border-radius: 30px;
            padding: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #f9ca24;
        }

        .answer-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-submit {
            flex: 1;
            background: #00b894;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #008f6b;
        }

            flex: 1;
            background: #e74c3c;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #c0392b;
        }

        .feedback {
            background: #2c3e66;
            border-radius: 40px;
            padding: 12px;
            margin: 15px 0;
            color: white;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .ranking {
            background: #1a1a2e;
            border-radius: 40px;
            padding: 15px;
            margin-top: 15px;
        }

        .ranking h3 { color: gold; margin-bottom: 10px; }
        .ranking-list { display: flex; flex-direction: column; gap: 6px; }
        .ranking-item { display: flex; justify-content: space-between; background: #2a2a40; padding: 8px 15px; border-radius: 30px; color: white; }
        .next-btn { background: #f39c12; border: none; border-radius: 50px; padding: 12px; font-size: 1.1rem; font-weight: bold; color: white; width: 100%; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 0 #b2631a; }
        .hidden { display: none; }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 500px) {

            .player-badge { padding: 4px 8px; font-size: 0.7rem; }
            .turn-indicator { font-size: 0.9rem; }
            .audio-btn { padding: 10px 15px; font-size: 0.8rem; }
        }
    </style>
</head>

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            voiceFeedback.innerHTML = "⚠️ Micro non supporté. Utilise le clavier !";
            micBtn.disabled = true;
            micBtn.style.opacity = "0.5";
            return false;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        
        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add("recording");
            micBtn.textContent = "🎤🔴";
            voiceFeedback.innerHTML = "🎙️ Parle maintenant (Titre ou Artiste)...";
            voiceFeedback.style.background = "#f9ca24";
            voiceFeedback.style.color = "#333";
        };
        
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove("recording");
            micBtn.textContent = "🎤 MIC";
            setTimeout(() => {
                if (!isRecording) {
                    voiceFeedback.innerHTML = "";
                    voiceFeedback.style.background = "transparent";
                }
            }, 2000);
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            voiceFeedback.innerHTML = `🎤 Tu as dit : "${transcript}"`;
            voiceFeedback.style.background = "#27ae60";
            voiceFeedback.style.color = "white";
            answerInput.value = transcript;
            setTimeout(() => {
                if (waitingAnswer && !gameFinished) checkAnswer();
            }, 300);
        };
        
        recognition.onerror = (event) => {
            voiceFeedback.innerHTML = `❌ Erreur micro: ${event.error}`;
            voiceFeedback.style.background = "#e74c3c";
            micBtn.classList.remove("recording");
            isRecording = false;
            micBtn.textContent = "🎤 MIC";
        };
        return true;
    }

    function startVoiceRecognition() {
        if (!waitingAnswer) {
            feedbackMsg.innerHTML = "⚠️ Écoute d'abord l'extrait ! Clique sur JOUER ⚠️";
            feedbackMsg.style.background = "#e74c3c";
            return;
        }
        if (recognition && !isRecording) {
            try { recognition.start(); } catch(e) { voiceFeedback.innerHTML = "❌ Micro indisponible"; }
        } else if (!recognition) {
            initSpeechRecognition();
            if (recognition && !isRecording) recognition.start();
        }
    }

    function normalizeString(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim()
            .replace(/[^\w\s]/g, "")
            .replace(/\s+/g, " ");
    }

    function checkAnswer() {
        if (!waitingAnswer && !gameFinished) {
            feedbackMsg.innerHTML = "⚠️ Écoute d'abord l'extrait ! Clique sur JOUER ⚠️";
            return;
        }
        
        const userAnswer = answerInput.value.trim();
        if (userAnswer === "") {
            feedbackMsg.innerHTML = "📝 Dis ou tape le TITRE ou l'ARTISTE ! 📝";
            return;
        }
        
        const currentPlayer = currentPlayers[currentPlayerIndex];
        const normalizedUser = normalizeString(userAnswer);
        const normalizedTitle = normalizeString(currentQuestion.title);
        const normalizedArtist = normalizeString(currentQuestion.artist);
        
        // Vérification du TITRE ou de l'ARTISTE
        const isTitleMatch = normalizedUser === normalizedTitle || 
                             normalizedTitle.includes(normalizedUser) || 
                             normalizedUser.includes(normalizedTitle);
        const isArtistMatch = normalizedUser === normalizedArtist || 
                              normalizedArtist.includes(normalizedUser) || 
                              normalizedUser.includes(normalizedArtist);
        
        const isCorrect = isTitleMatch || isArtistMatch;
        
        if (isCorrect) {
            currentPlayer.score++;
            let correctAnswer = "";
            if (isTitleMatch && isArtistMatch) correctAnswer = `"${currentQuestion.title}" de ${currentQuestion.artist}`;
            else if (isTitleMatch) correctAnswer = `"${currentQuestion.title}"`;
            else correctAnswer = currentQuestion.artist;
            
            feedbackMsg.innerHTML = `🎉 TRÈS BIEN ${currentPlayer.emoji} ${currentPlayer.name} ! C'était ${correctAnswer} ! +1 point ! 🎉`;
            feedbackMsg.style.background = "#27ae60";
            turnIndicator.classList.add("bounce");
            setTimeout(() => turnIndicator.classList.remove("bounce"), 300);
        } else {
            feedbackMsg.innerHTML = `❌ FAUX ${currentPlayer.emoji} ${currentPlayer.name} ! La réponse était "${currentQuestion.title}" de ${currentQuestion.artist}. ❌`;
            feedbackMsg.style.background = "#e74c3c";
        }
        
        waitingAnswer = false;
        answerInput.value = "";
        
        currentPlayerIndex++;
        if (currentPlayerIndex >= currentPlayers.length) currentPlayerIndex = 0;
        currentQuestionIndex++;
        
        if (currentQuestionIndex < shuffledQuestions.length) {
            currentQuestion = shuffledQuestions[currentQuestionIndex];
            extraitInfo.innerHTML = `🎵 Extrait ${currentQuestionIndex+1}/${shuffledQuestions.length} - ${currentQuestion.artist} (${currentQuestion.year}) 🎵`;
            updatePlayersUI();
            updateTurnDisplay();
            feedbackMsg.innerHTML += `<br>🎤 Au tour de ${currentPlayers[currentPlayerIndex].emoji} ${currentPlayers[currentPlayerIndex].name} ! Clique sur JOUER. 🎤`;
            if (audioPlayer) stopAudio();
        } else {
            endGame();
        }
        updatePlayersUI();
    }
    
    function skipTurn() {
        if (!waitingAnswer && !gameFinished) {
            feedbackMsg.innerHTML = "⚠️ Écoute d'abord l'extrait ! ⚠️";
            return;
        }
        const currentPlayer = currentPlayers[currentPlayerIndex];
        feedbackMsg.innerHTML = `😅 ${currentPlayer.emoji} ${currentPlayer.name} passe... C'était "${currentQuestion.title}" de ${currentQuestion.artist}. 😅`;
        waitingAnswer = false;
        answerInput.value = "";
        
        currentPlayerIndex++;
        if (currentPlayerIndex >= currentPlayers.length) currentPlayerIndex = 0;
        currentQuestionIndex++;
        
        if (currentQuestionIndex < shuffledQuestions.length) {
            currentQuestion = shuffledQuestions[currentQuestionIndex];
            extraitInfo.innerHTML = `🎵 Extrait ${currentQuestionIndex+1}/${shuffledQuestions.length} - ${currentQuestion.artist} (${currentQuestion.year}) 🎵`;
            updatePlayersUI();
            updateTurnDisplay();
            feedbackMsg.innerHTML += `<br>🎤 Au tour de ${currentPlayers[currentPlayerIndex].emoji} ${currentPlayers[currentPlayerIndex].name} ! 🎤`;
            if (audioPlayer) stopAudio();
        } else {
            endGame();
        }
        updatePlayersUI();
    }

    function playExtrait() {
        if (!currentQuestion) return;
        if (audioPlayer) { try { document.body.removeChild(audioPlayer); } catch(e) {} audioPlayer = null; }
        
        const { youtubeId, start, end } = currentQuestion;
        const embedUrl = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&start=${start}&end=${end}&enablejsapi=1&version=3`;
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = embedUrl;
        iframe.allow = "autoplay";
        document.body.appendChild(iframe);
        audioPlayer = iframe;
        
        waitingAnswer = true;
        const duration = (end - start) + 2;
        feedbackMsg.innerHTML = "🎧 Écoute bien ! Réponds par le TITRE ou l'ARTISTE après l'extrait... 🎧";
        
        setTimeout(() => {
            if (waitingAnswer) {
                feedbackMsg.innerHTML = "🎤 Maintenant, donne ta réponse (Titre ou Artiste) ! 🎤";
                answerInput.focus();
            }
        }, duration * 1000);
        
        setTimeout(() => {
            if (audioPlayer === iframe) {
                try { document.body.removeChild(iframe); } catch(e) {}
                if (audioPlayer === iframe) audioPlayer = null;
            }
        }, (duration + 2) * 1000);
    }

    function stopAudio() {
        if (audioPlayer) {
            try { document.body.removeChild(audioPlayer); } catch(e) {}
            audioPlayer = null;
        }
        feedbackMsg.innerHTML = "⏹ Extrait arrêté. Tu peux répondre (Titre ou Artiste) !";
    }

    function initGame() {
        shuffledQuestions = shuffleArray([...MUSIC_QUESTIONS]);
        currentPlayers = PLAYERS.map(p => ({ ...p, score: 0 }));
        currentPlayerIndex = 0;
        currentQuestionIndex = 0;
        gameFinished = false;
        waitingAnswer = false;
        
        currentQuestion = shuffledQuestions[0];
        
        updatePlayersUI();
        updateTurnDisplay();
        extraitInfo.innerHTML = `🎵 Extrait ${currentQuestionIndex+1}/${shuffledQuestions.length} - ${currentQuestion.artist} (${currentQuestion.year}) 🎵`;
        answerInput.value = "";
        answerInput.disabled = false;
        submitBtn.disabled = false;
        skipBtn.disabled = false;
        micBtn.disabled = false;
        micBtn.style.opacity = "1";
        
        rankingPanel.classList.add("hidden");
        feedbackMsg.innerHTML = `🎮 ${currentPlayers[currentPlayerIndex].emoji} ${currentPlayers[currentPlayerIndex].name} à toi ! Clique sur JOUER. Tu peux répondre par le TITRE ou l'ARTISTE !`;
        feedbackMsg.style.background = "#2c3e66";
        
        if (audioPlayer) { try { document.body.removeChild(audioPlayer); } catch(e) {} audioPlayer = null; }
    }

    function updatePlayersUI() {
        playersGrid.innerHTML = "";
        const sorted = [...currentPlayers].sort((a, b) => b.score - a.score);
        sorted.forEach(player => {
            const badge = document.createElement("div");
            badge.className = "player-badge";
            if (!gameFinished && currentPlayers[currentPlayerIndex]?.name === player.name) badge.classList.add("active");
            badge.innerHTML = `<span>${player.emoji}</span><span>${player.name}</span><span class="player-score">${player.score}</span>`;
            playersGrid.appendChild(badge);
        });
    }

    function updateTurnDisplay() {
        if (!gameFinished && currentPlayers[currentPlayerIndex]) {
            currentPlayerNameSpan.innerHTML = `${currentPlayers[currentPlayerIndex].emoji} ${currentPlayers[currentPlayerIndex].name}`;
        }
    }

    function endGame() {
        gameFinished = true;
        waitingAnswer = false;
        const sorted = [...currentPlayers].sort((a, b) => b.score - a.score);
        rankingPanel.classList.remove("hidden");
        const rankingList = document.getElementById("rankingList");
        rankingList.innerHTML = "";
        sorted.forEach((player, idx) => {
            const medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "📌";
            const item = document.createElement("div");
            item.className = "ranking-item";
            item.innerHTML = `<span>${medal} ${player.emoji} ${player.name}</span><span style="color:gold;">${player.score} pts</span>`;
            rankingList.appendChild(item);
        });
        feedbackMsg.innerHTML = `🏆 FIN DU JEU ! GAGNANT : ${sorted[0].emoji} ${sorted[0].name} avec ${sorted[0].score} points ! 🏆`;
        answerInput.disabled = true;
        submitBtn.disabled = true;
        skipBtn.disabled = true;
        micBtn.disabled = true;
        if (audioPlayer) stopAudio();
    }

    // Événements
    playBtn.addEventListener("click", playExtrait);
    stopBtn.addEventListener("click", stopAudio);
    submitBtn.addEventListener("click", checkAnswer);
    skipBtn.addEventListener("click", skipTurn);
    micBtn.addEventListener("click", startVoiceRecognition);
    restartBtn.addEventListener("click", () => { initGame(); });
    answerInput.addEventListener("keypress", (e) => { if (e.key === "Enter" && waitingAnswer && !gameFinished) checkAnswer(); });
    
    initSpeechRecognition();
    initGame();
</script>
</body>
</html>
